version: '3.8'

services:
  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: aniguide
      POSTGRES_PASSWORD: super_secret_password_123
      POSTGRES_DB: aniguide_production
    restart: always

  web:
    build: .
    volumes:
      - .:/app
      - storage_data:/app/storage  # Папка с картинками не удалится при перезапуске
    ports:
      - "80:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://aniguide:super_secret_password_123@db/aniguide_production
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
    restart: always

volumes:
  postgres_data:
  storage_data:
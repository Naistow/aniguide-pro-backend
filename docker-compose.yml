version: '3.8'

services:
  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: aniguide
      POSTGRES_PASSWORD: super_secret_password_123
      POSTGRES_DB: aniguide_production
    restart: always

  web:
    build: .
    volumes:
      - .:/app
      - storage_data:/app/storage
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://aniguide:super_secret_password_123@db/aniguide_production
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
    restart: always

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    # Обязательно проверь, чтобы домен был написан без ошибок!
    command: caddy reverse-proxy --from aniguidepro.ru --to web:3000

volumes:
  postgres_data:
  storage_data:
  caddy_data:
  caddy_config: